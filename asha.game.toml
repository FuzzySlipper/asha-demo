# ASHA Game Project manifest for the human-facing demo repo.
# The served UI loads the ProjectBundle and attaches a public Rust-backed
# RuntimeSession when a host provides the runtime bridge.

[asha]
engine_version = "0.1.0"
contracts_version = "0.1.0"
runtime_bridge_version = "0.1.0"
devtools_protocol_version = "devtools-protocol.v0"
publish_artifact_format_version = "publish-artifact.v0"
engine_source = "../asha-engine"

[asha.compatibility]
pin_kind = "local-worktree-contract"
consumer_base_commit = "1c1f397a6134185c38ca60f7d249c198c2ca95fe"
engine_base_commit = "22383bee048af721c582130bc198e9778e0eeb81"
contracts_compatibility = "contracts.v0"
runtime_bridge_compatibility = "runtime-bridge.v0"
required_task_reviews = [5613, 5641, 5642, 5643, 5705, 5706, 5707]
required_operations = [
  "configure_input_session",
  "apply_input_context_command",
  "submit_raw_input",
  "replay_resolved_input_action",
  "read_input_context_state",
  "apply_time_control_command",
  "read_time_control_state",
]
pin_note = "The pinned engine commit contains the public BrowserInputHost and resolved time-control composition surfaces; task review ids bind the later shared-worktree behavior under review."

[workspace]
scene_roots = ["levels/presets", "levels/scenes"]
asset_roots = ["assets"]
replay_roots = ["replays"]
catalog_packages = ["catalogs/actors", "catalogs/gameplay", "catalogs/materials", "catalogs/spawns", "catalogs/weapons"]
policy_packages = []

[runtime]
dev_command = "npm run dev"
devtools_endpoint = "ws://127.0.0.1:7391"
wasm_or_native_entry = "dist/runtime/index.js"
backend_mode = "native"
backend_profile = "native.napi.launcher.v1"
backend_proof_refs = ["artifacts/4217/generated-tunnel-room.png"]

[studio]
workspace_mode = true
attach_enabled = false
allowed_source_writes = ["levels/presets", "levels/scenes", "assets", "catalogs/actors", "catalogs/gameplay", "catalogs/materials", "catalogs/spawns", "catalogs/weapons"]

[publish]
command = "npm run build"
artifact_dir = "dist"
verify_command = "npm run typecheck"

[dev_resource_profile]
local_roots = ["assets", "catalogs/actors", "catalogs/gameplay", "catalogs/materials", "catalogs/spawns", "catalogs/weapons"]
cache_dir = "dist/dev-cache"
resolution_policy = "prefer-source"

[publish_resource_profile]
output_dir = "dist/resources"
archive_dir = "dist/archive"
resolution_policy = "locked"
