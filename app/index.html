<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="den-project" content="asha-demo">
    <title>ASHA Renderer Surface</title>
    <link rel="stylesheet" href="/styles.css">
    <script type="importmap">
      {
        "imports": {
          "@asha/catalog-core": "/vendor/asha-catalog-core/index.js",
          "@asha/contracts": "/vendor/asha-contracts/index.js",
          "@asha/game-workspace": "/vendor/asha-game-workspace/index.js",
          "@asha/render-projection": "/vendor/asha-render-projection/index.js",
          "@asha/renderer-host": "/vendor/asha-renderer-host/index.js",
          "@asha/runtime-bridge": "/vendor/asha-runtime-bridge/browser.js",
          "@asha/runtime-session": "/vendor/asha-runtime-session/index.js",
          "@asha/ui-dom": "/vendor/asha-ui-dom/hud.js",
          "three": "/vendor/asha-renderer-host/vendor/three/build/three.module.js",
          "three/": "/vendor/asha-renderer-host/vendor/three/"
        },
        "scopes": {
          "/vendor/asha-renderer-host/": {
            "@asha/renderer-three": "/vendor/asha-renderer-host/vendor/asha-renderer-three/index.js",
            "@asha/renderer-three/backend": "/vendor/asha-renderer-host/vendor/asha-renderer-three/backend.js"
          },
          "/vendor/asha-renderer-host/vendor/asha-renderer-three/": {
            "three": "/vendor/asha-renderer-host/vendor/three/build/three.module.js"
          }
        }
      }
    </script>
  </head>
  <body>
    <canvas
      id="asha-render-surface"
      data-demo-readout="asha-renderer-browser-surface"
      aria-label="ASHA renderer browser surface"
    ></canvas>
    <div
      id="asha-billboard-layer"
      data-demo-readout="asha-billboard-layer"
      aria-label="ASHA world-space billboard projection"
    ></div>
    <div id="reticle" class="reticle" data-state="idle" data-demo-readout="reticle"></div>
    <section class="hud-panel" aria-label="Tunnel sentinel encounter status">
      <div class="hud-row">
        <span>Objective</span>
        <strong id="challenge-state" data-status="ready">DEFEAT THE TUNNEL SENTINEL</strong>
      </div>
      <div class="hud-row">
        <span>Sentinel</span>
        <strong id="target-state">45/45</strong>
      </div>
      <div class="hud-row">
        <span>Shots</span>
        <strong id="shot-state">0 hits · 0 misses</strong>
      </div>
      <div class="hud-row">
        <span>Player</span>
        <strong id="player-health-state">100/100</strong>
      </div>
      <div class="health-meter" aria-label="Enemy health">
        <span id="health-fill"></span>
      </div>
      <div class="health-meter player-health-meter" aria-label="Player health">
        <span id="player-health-fill"></span>
      </div>
      <div id="death-state" class="death-state" hidden>
        <strong>Player defeated</strong>
        <span>Press R or Reset to restart.</span>
      </div>
      <p id="event-state" class="event-state">Ready</p>
    </section>
    <nav class="command-bar" aria-label="ASHA demo commands">
      <button id="lock-button" type="button">Capture Mouse</button>
      <button id="fire-button" type="button" disabled>Fire</button>
      <button id="pause-button" type="button">Pause</button>
      <button id="reset-button" type="button">Reset</button>
    </nav>
    <section id="pause-menu" class="pause-menu" data-mode="closed" data-demo-readout="pause-menu" hidden>
      <div class="pause-dialog" role="dialog" aria-modal="true" aria-labelledby="pause-menu-title">
        <h1 id="pause-menu-title">Paused</h1>
        <p id="pause-menu-status">Runtime paused. Resume or restart through typed HUD intents.</p>
        <div class="pause-actions">
          <button id="resume-button" type="button" data-control-id="hud-resume" hidden>Resume</button>
          <button id="menu-reset-button" type="button" data-control-id="hud-restart">Restart</button>
          <button id="options-button" type="button" data-control-id="hud-options">Options</button>
          <button id="exit-button" type="button" data-control-id="hud-exit" hidden>Exit</button>
        </div>
        <div id="options-pane" class="menu-pane" hidden>
          <strong>Options</strong>
          <label for="move-speed-input">Move speed <output id="move-speed-value">3.0</output> units/s</label>
          <input id="move-speed-input" type="range" min="2" max="6" step="0.5" value="3">
          <label for="look-sensitivity-input">Look sensitivity <output id="look-sensitivity-value">0.1</output> deg/px</label>
          <input id="look-sensitivity-input" type="range" min="0.05" max="0.2" step="0.01" value="0.1">
          <label class="checkbox-control" for="invert-y-input">
            <input id="invert-y-input" type="checkbox">
            Invert Y look
          </label>
          <span>These controls shape input before it is submitted to runtime authority.</span>
        </div>
      </div>
    </section>
    <script type="module" src="/app.js"></script>
  </body>
</html>
