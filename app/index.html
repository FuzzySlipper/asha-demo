<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="den-project" content="asha-demo">
    <title>ASHA Renderer Surface</title>
    <link rel="stylesheet" href="/styles.css">
    <script type="importmap">
      {
        "imports": {
          "@asha/catalog-core": "/vendor/asha-catalog-core/index.js",
          "@asha/contracts": "/vendor/asha-contracts/index.js",
          "@asha/render-projection": "/vendor/asha-render-projection/index.js",
          "@asha/renderer-three": "/vendor/asha-renderer-three/index.js",
          "@asha/runtime-bridge": "/vendor/asha-runtime-bridge/browser.js",
          "@asha/runtime-bridge/reference": "/vendor/asha-runtime-bridge/reference.js",
          "three": "/vendor/three/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <canvas
      id="asha-render-surface"
      data-demo-readout="asha-renderer-browser-surface"
      aria-label="ASHA renderer browser surface"
    ></canvas>
    <div id="reticle" class="reticle" data-state="idle" data-demo-readout="reticle"></div>
    <section class="hud-panel" aria-label="ASHA demo status">
      <div class="hud-row">
        <span>Lock</span>
        <strong id="lock-state" data-locked="false">UNLOCKED</strong>
      </div>
      <div class="hud-row">
        <span>Targets</span>
        <strong id="target-state">0/0</strong>
      </div>
      <div class="hud-row">
        <span>Hits</span>
        <strong id="shot-state">0/0</strong>
      </div>
      <div class="hud-row">
        <span>Player</span>
        <strong id="player-health-state">100/100</strong>
      </div>
      <div class="hud-row">
        <span>Pose</span>
        <strong id="pose-state">0, 0 | 0</strong>
      </div>
      <div class="health-meter" aria-label="Enemy health">
        <span id="health-fill"></span>
      </div>
      <div class="health-meter player-health-meter" aria-label="Player health">
        <span id="player-health-fill"></span>
      </div>
      <p id="event-state" class="event-state">Ready</p>
    </section>
    <nav class="command-bar" aria-label="ASHA demo commands">
      <button id="lock-button" type="button">Lock</button>
      <button id="fire-button" type="button">Fire</button>
      <button id="reset-button" type="button">Reset</button>
    </nav>
    <script type="module" src="/app.js"></script>
  </body>
</html>
